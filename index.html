<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#b91c1c"><link rel="manifest" href="manifest.webmanifest">
<title>危険物乙4 合格トレーナー</title>
<style>
:root{--r:#b91c1c;--bg:#f5f4ef;--card:#fff;--txt:#1f2937;--mut:#6b7280;--line:#e5e7eb;--fs:16px}
body.dark{--bg:#111827;--card:#1f2937;--txt:#f9fafb;--mut:#cbd5e1;--line:#374151}
*{box-sizing:border-box}html{font-size:var(--fs)}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
header{position:sticky;top:0;z-index:5;background:var(--r);color:#fff;padding:12px 14px}.top{display:flex;justify-content:space-between;align-items:center}h1{font-size:1.15rem;margin:0}.sub{font-size:.74rem}
main{max-width:720px;margin:auto;padding:14px 14px 90px}.card{background:var(--card);border-radius:16px;padding:17px;margin:12px 0;box-shadow:0 3px 15px #0002}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}button{font:inherit;border:0;border-radius:12px;padding:13px;cursor:pointer}
.mode{background:var(--card);color:var(--txt);border:1px solid var(--line);text-align:left;min-height:85px}.mode b{display:block}.mode span,.muted{font-size:.78rem;color:var(--mut)}
.primary{background:var(--r);color:white;font-weight:800}.secondary{background:var(--line);color:var(--txt)}.icon{background:#ffffff22;color:white;padding:8px}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}.badge{padding:5px 9px;border-radius:99px;background:#fee2e2;color:#991b1b;font-size:.75rem;font-weight:800}
.progress{height:10px;background:var(--line);border-radius:99px;overflow:hidden}.bar{height:100%;background:var(--r)}.question{font-size:1.25rem;line-height:1.55;font-weight:800;margin:15px 0}
.choice{width:100%;margin:7px 0;text-align:left;background:var(--card);color:var(--txt);border:2px solid var(--line);display:flex;gap:10px}.correct{border-color:#15803d;background:#dcfce7;color:#14532d}.wrong{border-color:#c2410c;background:#ffedd5;color:#7c2d12}
.explain{border-left:5px solid var(--r);background:#fff7ed;color:#431407;padding:13px;border-radius:8px;margin-top:14px;line-height:1.6}.hidden{display:none!important}
.score{font-size:2.8rem;font-weight:900;color:var(--r);text-align:center}.stats{width:100%;border-collapse:collapse}.stats td{padding:9px;border-bottom:1px solid var(--line)}
.star{font-size:1.4rem;background:transparent;color:#f59e0b;padding:3px}.notice{background:#eff6ff;color:#1e3a8a;padding:10px;border-radius:9px;font-size:.78rem;line-height:1.5}
@media(max-width:440px){.grid{grid-template-columns:1fr}}
</style></head><body>
<header><div class="top"><div><h1>危険物乙4 合格トレーナー</h1><div class="sub">100問・模試・復習・お気に入り・オフライン</div></div><div><button class="icon" onclick="fontSize()">文字</button><button class="icon" onclick="dark()">◐</button></div></div></header>
<main>
<section id="home">
<div class="card"><div class="row"><div><b>学習状況</b><div id="summary" class="muted"></div></div><span id="today" class="badge"></span></div><div class="progress" style="margin-top:12px"><div id="homebar" class="bar"></div></div><div class="row" style="margin-top:9px"><span id="rate" class="muted"></span><span id="wrongInfo" class="muted"></span></div><button id="install" class="primary hidden" style="width:100%;margin-top:10px">ホーム画面に追加</button></div>
<div class="grid">
<button class="mode" onclick="start('daily')"><b>🔥 今日の10問</b><span>ランダム出題</span></button>
<button class="mode" onclick="start('mock')"><b>📝 35問模試</b><span>60分・科目別判定</span></button>
<button class="mode" onclick="showCat()"><b>📚 分野別問題</b><span>3分野から選択</span></button>
<button class="mode" onclick="start('wrong')"><b>🔁 間違い復習</b><span id="wrongCount"></span></button>
<button class="mode" onclick="start('book')"><b>★ お気に入り</b><span id="bookCount"></span></button>
<button class="mode" onclick="start('all')"><b>💯 全100問</b><span>すべて学習</span></button>
<button class="mode" onclick="stats()"><b>📊 成績・苦手分析</b><span>分野別正答率</span></button>
<button class="mode" onclick="settings()"><b>⚙ 設定</b><span>文字・画面・履歴</span></button>
</div><div class="notice" style="margin-top:14px">学習用オリジナル問題です。受験前は最新の公式情報も確認してください。</div>
</section>
<section id="cat" class="hidden"><div class="card"><h2>分野を選択</h2><button class="choice" onclick="startCat('法令')">法令（35問）</button><button class="choice" onclick="startCat('物理化学')">物理・化学（25問）</button><button class="choice" onclick="startCat('性質消火')">性質・消火（40問）</button><button class="secondary" onclick="home()">戻る</button></div></section>
<section id="quiz" class="hidden"><div class="card"><div class="row"><span id="badge" class="badge"></span><div><b id="timer"></b> <span id="count" class="muted"></span></div></div><div class="progress" style="margin-top:10px"><div id="qbar" class="bar"></div></div><div class="row"><span></span><button id="star" class="star" onclick="bookmark()">☆</button></div><div id="q" class="question"></div><div id="choices"></div><div id="feed" class="hidden"></div><button id="next" class="primary hidden" style="width:100%;margin-top:14px" onclick="next()">次へ</button><button class="secondary" style="width:100%;margin-top:8px" onclick="quit()">中断</button></div></section>
<section id="result" class="hidden"><div class="card"><h2 style="text-align:center">結果</h2><div id="score" class="score"></div><div id="msg" style="text-align:center;font-weight:800"></div><table id="resultTable" class="stats"></table><button class="primary" style="width:100%;margin-top:14px" onclick="home()">ホームへ</button></div></section>
<section id="stats" class="hidden"><div class="card"><h2>成績・苦手分析</h2><table id="statsTable" class="stats"></table><h3>苦手問題</h3><div id="weak" class="muted"></div><button class="primary" style="width:100%;margin-top:14px" onclick="home()">戻る</button></div></section>
<section id="settings" class="hidden"><div class="card"><h2>設定</h2><button class="secondary" onclick="dark()">ダークモード</button><button class="secondary" onclick="fontSize()">文字サイズ</button><button class="secondary" style="width:100%;margin-top:15px" onclick="exportData()">成績を書き出す</button><button class="secondary" style="width:100%;margin-top:8px" onclick="resetData()">成績をリセット</button><button class="primary" style="width:100%;margin-top:14px" onclick="home()">戻る</button></div></section>
</main><script src="questions.js"></script>
<script>
const $=s=>document.querySelector(s),ids=['home','cat','quiz','result','stats','settings'];let list=[],pos=0,done=false,res=[],mode='',sec=0,tick=null,promptEvent=null;
let st=Object.assign({a:{},wrong:[],book:[],day:'',today:0,dark:false,font:0},JSON.parse(localStorage.getItem('otsu4-final')||'{}'));
function save(){localStorage.setItem('otsu4-final',JSON.stringify(st))}function show(x){ids.forEach(i=>$('#'+i).classList.toggle('hidden',i!==x));scrollTo(0,0)}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function d(){return new Date().toLocaleDateString('ja-JP')}function touch(){if(st.day!==d()){st.day=d();st.today=0}}
function prefs(){document.body.classList.toggle('dark',st.dark);document.documentElement.style.setProperty('--fs',st.font==1?'18px':st.font==2?'20px':'16px')}
function dark(){st.dark=!st.dark;save();prefs()}function fontSize(){st.font=(st.font+1)%3;save();prefs()}
function start(m){touch();mode=m;if(m==='daily')list=shuffle(QUESTIONS).slice(0,10);if(m==='all')list=[...QUESTIONS];if(m==='wrong'){list=QUESTIONS.filter(q=>st.wrong.includes(q.id));if(!list.length)return alert('間違い問題はありません')}if(m==='book'){list=QUESTIONS.filter(q=>st.book.includes(q.id));if(!list.length)return alert('お気に入りはありません')}if(m==='mock')list=shuffle([...shuffle(QUESTIONS.filter(q=>q.category==='法令')).slice(0,15),...shuffle(QUESTIONS.filter(q=>q.category==='物理化学')).slice(0,10),...shuffle(QUESTIONS.filter(q=>q.category==='性質消火')).slice(0,10)]);begin()}
function startCat(c){mode='cat';list=shuffle(QUESTIONS.filter(q=>q.category===c));begin()}function begin(){pos=0;res=[];sec=mode==='mock'?3600:0;show('quiz');timer();render()}
function timer(){clearInterval(tick);if(mode!=='mock'){$('#timer').textContent='';return}upTimer();tick=setInterval(()=>{sec--;upTimer();if(sec<=0){clearInterval(tick);finish()}},1000)}function upTimer(){$('#timer').textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0')}
function render(){done=false;let q=list[pos];$('#badge').textContent=q.category;$('#count').textContent=(pos+1)+'/'+list.length;$('#qbar').style.width=(pos/list.length*100)+'%';$('#star').textContent=st.book.includes(q.id)?'★':'☆';$('#q').textContent=q.question;$('#feed').className='hidden';$('#next').classList.add('hidden');$('#choices').innerHTML='';['A','B','C','D'].forEach((x,i)=>{let b=document.createElement('button');b.className='choice';b.innerHTML='<b>'+x+'</b><span>'+q.choices[i]+'</span>';b.onclick=()=>answer(i);$('#choices').appendChild(b)})}
function answer(i){if(done)return;done=true;touch();st.today++;let q=list[pos],ok=i===q.answer;res.push({cat:q.category,ok,id:q.id});st.a[q.id]??={r:0,t:0};st.a[q.id].t++;if(ok)st.a[q.id].r++;if(ok)st.wrong=st.wrong.filter(x=>x!==q.id);else if(!st.wrong.includes(q.id))st.wrong.push(q.id);[...$('#choices').children].forEach((b,j)=>{b.disabled=true;if(j===q.answer)b.classList.add('correct');if(j===i&&!ok)b.classList.add('wrong')});$('#feed').className='explain';$('#feed').innerHTML='<b>'+(ok?'⭕ 正解':'❌ 不正解')+'</b><br>正解：'+q.choices[q.answer]+'<br>'+q.explanation;$('#next').textContent=pos===list.length-1?'結果を見る':'次へ';$('#next').classList.remove('hidden');save()}
function next(){pos++;pos>=list.length?finish():render()}function bookmark(){let id=list[pos].id;st.book=st.book.includes(id)?st.book.filter(x=>x!==id):[...st.book,id];save();$('#star').textContent=st.book.includes(id)?'★':'☆'}
function quit(){if(confirm('中断しますか？'))home()}function finish(){clearInterval(tick);show('result');let c=res.filter(x=>x.ok).length,p=res.length?Math.round(c/res.length*100):0,pass=true,rows='';['法令','物理化学','性質消火'].forEach(cat=>{let a=res.filter(x=>x.cat===cat);if(a.length){let r=a.filter(x=>x.ok).length,z=Math.round(r/a.length*100);if(mode==='mock'&&z<60)pass=false;rows+='<tr><td>'+cat+'</td><td>'+r+'/'+a.length+'</td><td>'+z+'%</td></tr>'}});$('#score').textContent=c+'/'+res.length;$('#msg').textContent=mode==='mock'?(pass&&res.length===35?'🎉 模試判定：合格':'模試判定：不合格'):p>=60?'合格圏です':'復習して再挑戦しましょう';$('#resultTable').innerHTML=rows}
function showCat(){show('cat')}function settings(){show('settings')}function home(){clearInterval(tick);show('home');update()}
function stats(){show('stats');let R=0,T=0,rows='';['法令','物理化学','性質消火'].forEach(c=>{let r=0,t=0;QUESTIONS.filter(q=>q.category===c).forEach(q=>{let a=st.a[q.id];if(a){r+=a.r;t+=a.t}});R+=r;T+=t;rows+='<tr><td>'+c+'</td><td>'+r+'/'+t+'</td><td>'+(t?Math.round(r/t*100):0)+'%</td></tr>'});rows+='<tr><td><b>総合</b></td><td><b>'+R+'/'+T+'</b></td><td><b>'+(T?Math.round(R/T*100):0)+'%</b></td></tr>';$('#statsTable').innerHTML=rows;let w=Object.entries(st.a).filter(([id,a])=>a.t>=2&&a.r/a.t<.6).slice(0,10);$('#weak').innerHTML=w.length?w.map(([id,a])=>'第'+id+'問　正答率 '+Math.round(a.r/a.t*100)+'%').join('<br>'):'まだ分析データがありません'}
function update(){touch();let n=Object.keys(st.a).length,R=0,T=0;Object.values(st.a).forEach(a=>{R+=a.r;T+=a.t});$('#summary').textContent='100問中 '+n+'問に挑戦';$('#homebar').style.width=n+'%';$('#today').textContent='今日 '+st.today+'問';$('#rate').textContent='総合正答率 '+(T?Math.round(R/T*100):0)+'%';$('#wrongInfo').textContent='間違い '+st.wrong.length+'問';$('#wrongCount').textContent=st.wrong.length+'問を復習';$('#bookCount').textContent=st.book.length+'問を保存';save()}
function resetData(){if(confirm('履歴を削除しますか？')){localStorage.removeItem('otsu4-final');location.reload()}}function exportData(){let b=new Blob([JSON.stringify(st,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='乙4成績.json';a.click()}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();promptEvent=e;$('#install').classList.remove('hidden')});$('#install').onclick=async()=>{if(promptEvent){promptEvent.prompt();await promptEvent.userChoice;promptEvent=null;$('#install').classList.add('hidden')}}
if('serviceWorker'in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('sw.js');prefs();update();
</script></body></html>
