<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7f1d1d">
<link rel="manifest" href="manifest.webmanifest">
<title>危険物乙4 MASTER V4</title>
<style>
:root{--red:#b91c1c;--deep:#7f1d1d;--bg:#f4f2ed;--card:#fff;--text:#20242b;--muted:#68707c;--line:#e2e5e9;--ok:#15803d;--bad:#c2410c;--blue:#1d4ed8;--gold:#d97706}
body.dark{--bg:#0f172a;--card:#1e293b;--text:#f8fafc;--muted:#cbd5e1;--line:#334155}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
header{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--deep),var(--red));color:#fff;padding:12px 14px;box-shadow:0 2px 10px #0004}
.top{max-width:820px;margin:auto;display:flex;justify-content:space-between;align-items:center;gap:10px}
h1{font-size:1.14rem;margin:0}.sub{font-size:.72rem;opacity:.9}.headbtn{border:0;border-radius:10px;padding:8px;background:#ffffff25;color:#fff;font-weight:700}
main{max-width:820px;margin:auto;padding:13px 13px 100px}.card{background:var(--card);border-radius:17px;padding:16px;margin:12px 0;box-shadow:0 3px 16px #0002}
.row{display:flex;justify-content:space-between;align-items:center;gap:9px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{font:inherit;border:0;border-radius:12px;padding:13px;cursor:pointer}.mode{background:var(--card);color:var(--text);border:1px solid var(--line);text-align:left;min-height:87px}
.mode b{display:block;font-size:1rem}.mode span,.muted{color:var(--muted);font-size:.78rem}.primary{background:var(--red);color:#fff;font-weight:800}.secondary{background:var(--line);color:var(--text)}.blue{background:var(--blue);color:#fff;font-weight:800}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:11px}.metric{border:1px solid var(--line);background:var(--bg);border-radius:12px;padding:9px;text-align:center}.metric b{display:block;font-size:1.08rem}.metric span{font-size:.68rem;color:var(--muted)}
.progress{height:11px;background:var(--line);border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--deep),var(--red))}
.levelbox{border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:12px}.badge{display:inline-block;padding:5px 9px;border-radius:99px;background:#fee2e2;color:#991b1b;font-size:.73rem;font-weight:800}
.question{font-size:1.2rem;line-height:1.55;font-weight:800;margin:15px 0}.choice{width:100%;margin:7px 0;text-align:left;background:var(--card);color:var(--text);border:2px solid var(--line);display:flex;gap:10px}.choice.correct{border-color:var(--ok);background:#dcfce7;color:#14532d}.choice.wrong{border-color:var(--bad);background:#ffedd5;color:#7c2d12}
.explain{border-left:5px solid var(--red);background:#fff7ed;color:#431407;padding:13px;border-radius:9px;margin-top:13px;line-height:1.65}.hidden{display:none!important}
.stats{width:100%;border-collapse:collapse}.stats td,.stats th{padding:9px;border-bottom:1px solid var(--line);text-align:left}.score{font-size:2.7rem;font-weight:900;color:var(--red);text-align:center}
.notice{background:#eff6ff;color:#1e3a8a;padding:11px;border-radius:10px;font-size:.78rem;line-height:1.55}.advice{background:#fef3c7;color:#78350f;padding:12px;border-radius:12px;line-height:1.55}
.small{padding:8px 10px;font-size:.8rem}.star{background:transparent;color:#f59e0b;font-size:1.5rem;padding:4px}.flag{background:transparent;color:var(--blue);font-size:1.3rem;padding:4px}
.examnav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.qgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}.qnum{padding:8px 3px;background:var(--line);color:var(--text);font-size:.76rem}.qnum.done{background:#bfdbfe}.qnum.flagged{outline:3px solid #f59e0b}.qnum.current{background:var(--red);color:#fff}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{border-radius:8px;padding:8px 2px;text-align:center;background:var(--line);font-size:.72rem}.day.active{background:#fecaca;color:#7f1d1d;font-weight:800}
.barrow{margin:12px 0}.barlabel{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:4px}.mini{height:9px;background:var(--line);border-radius:99px;overflow:hidden}.mini div{height:100%;background:var(--red)}
.achievements{display:flex;flex-wrap:wrap;gap:8px}.achievement{border:1px solid var(--line);border-radius:10px;padding:8px;font-size:.77rem}.locked{opacity:.35}
input,select{font:inherit;padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--text)}
@media(max-width:580px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header><div class="top"><div><h1>危険物乙4 MASTER V4</h1><div class="sub">本番模試・レベル・バッジ・学習カレンダー</div></div><button class="headbtn" onclick="toggleDark()">◐</button></div></header>
<main>
<section id="home">
<div class="card">
 <div class="row"><div><b>今日の学習</b><div id="summary" class="muted"></div></div><span id="todayBadge" class="badge"></span></div>
 <div class="progress" style="margin-top:11px"><div id="dailyBar" class="bar"></div></div>
 <div class="metrics">
  <div class="metric"><b id="rate">0%</b><span>総合正答率</span></div>
  <div class="metric"><b id="streak">0日</b><span>連続学習</span></div>
  <div class="metric"><b id="minutes">0分</b><span>累計学習</span></div>
  <div class="metric"><b id="best">-</b><span>模試最高</span></div>
 </div>
 <div class="levelbox"><div class="row"><b id="level">Lv.1 見習い</b><span id="xpText" class="muted"></span></div><div class="progress" style="margin-top:8px"><div id="xpBar" class="bar"></div></div></div>
 <div id="advice" class="advice" style="margin-top:12px"></div>
</div>

<div class="grid">
 <button class="mode" onclick="startMode('priority')"><b>🎯 合格へのおすすめ</b><span>苦手・重要・未学習を優先</span></button>
 <button class="mode" onclick="startMode('mock')"><b>📝 本試験35問模試</b><span>2時間・見直しマーク対応</span></button>
 <button class="mode" onclick="startMode('daily')"><b>🔥 今日の10問</b><span>短時間で毎日学習</span></button>
 <button class="mode" onclick="showPage('categories')"><b>📚 分野別問題</b><span>法令・物理化学・性質消火</span></button>
 <button class="mode" onclick="startMode('wrong')"><b>🔁 間違い復習</b><span id="wrongText"></span></button>
 <button class="mode" onclick="startMode('book')"><b>★ お気に入り</b><span id="bookText"></span></button>
 <button class="mode" onclick="showStats()"><b>📊 成績・学習カレンダー</b><span>苦手分野と継続状況</span></button>
 <button class="mode" onclick="showBadges()"><b>🏆 バッジ・称号</b><span>学習実績を確認</span></button>
 <button class="mode" onclick="showPage('settings')"><b>⚙ 設定・バックアップ</b><span>目標・音声・データ保存</span></button>
 <button class="mode" onclick="startMode('all')"><b>💯 全100問</b><span>現在収録の全問題</span></button>
</div>
<div class="notice" style="margin-top:12px">V4は機能強化版です。問題は精度を優先して現在の100問を使用しています。合格可能性は学習用の目安です。</div>
</section>

<section id="categories" class="hidden"><div class="card"><h2>分野を選択</h2>
<button class="choice" onclick="startCategory('法令')">法令</button>
<button class="choice" onclick="startCategory('物理化学')">物理・化学</button>
<button class="choice" onclick="startCategory('性質消火')">性質・火災予防・消火</button>
<button class="secondary" style="width:100%;margin-top:8px" onclick="goHome()">戻る</button></div></section>

<section id="quiz" class="hidden"><div class="card">
<div class="row"><span id="catBadge" class="badge"></span><div><b id="timer"></b> <span id="counter" class="muted"></span></div></div>
<div class="progress" style="margin-top:9px"><div id="quizBar" class="bar"></div></div>
<div class="row"><button class="small blue" onclick="speakQuestion()">🔊 読み上げ</button><div><button id="flagBtn" class="flag hidden" onclick="toggleFlag()">⚑</button><button id="starBtn" class="star" onclick="toggleBook()">☆</button></div></div>
<div id="question" class="question"></div><div id="choices"></div><div id="feedback" class="hidden"></div>
<div id="examNav" class="hidden"><div class="examnav"><button class="secondary" onclick="examMove(-1)">前へ</button><button class="secondary" onclick="examMove(1)">次へ</button></div><div id="qgrid" class="qgrid"></div><button class="primary" style="width:100%;margin-top:12px" onclick="submitMock()">模試を採点する</button></div>
<button id="nextBtn" class="primary hidden" style="width:100%;margin-top:12px" onclick="nextQuestion()">次へ</button>
<button class="secondary" style="width:100%;margin-top:8px" onclick="quitQuiz()">中断</button>
</div></section>

<section id="result" class="hidden"><div class="card"><h2 style="text-align:center">学習結果</h2><div id="score" class="score"></div><div id="resultMsg" style="text-align:center;font-weight:800;margin:10px"></div><table id="resultTable" class="stats"></table><button class="primary" style="width:100%;margin-top:14px" onclick="goHome()">ホームへ</button></div></section>

<section id="statsPage" class="hidden"><div class="card"><h2>成績分析</h2><div id="categoryBars"></div><h3>直近14日</h3><div id="calendar" class="calendar"></div><h3>苦手問題</h3><div id="weakList" class="muted"></div><button class="primary" style="width:100%;margin-top:12px" onclick="startMode('priority')">おすすめ問題を開始</button><button class="secondary" style="width:100%;margin-top:8px" onclick="goHome()">戻る</button></div></section>

<section id="badgesPage" class="hidden"><div class="card"><h2>バッジ・称号</h2><div id="badgeList" class="achievements"></div><button class="secondary" style="width:100%;margin-top:14px" onclick="goHome()">戻る</button></div></section>

<section id="settings" class="hidden"><div class="card"><h2>設定・バックアップ</h2>
<div class="row"><span>1日の目標問題数</span><input id="goal" type="number" min="1" max="200" style="width:90px"></div>
<div class="row" style="margin-top:12px"><span>読み上げ速度</span><select id="speechRate"><option value=".8">0.8倍</option><option value="1">1.0倍</option><option value="1.2">1.2倍</option><option value="1.4">1.4倍</option></select></div>
<button class="primary" style="width:100%;margin-top:12px" onclick="saveSettings()">設定を保存</button>
<button class="blue" style="width:100%;margin-top:9px" onclick="exportData()">成績をバックアップ</button>
<label class="secondary" style="display:block;text-align:center;padding:13px;margin-top:9px;border-radius:12px;cursor:pointer">バックアップを読み込む<input type="file" accept=".json" hidden onchange="importData(event)"></label>
<button class="secondary" style="width:100%;margin-top:9px" onclick="goHome()">戻る</button>
<button style="width:100%;margin-top:18px;background:#fee2e2;color:#991b1b" onclick="resetData()">学習履歴を削除</button>
</div></section>
</main>
<script src="questions.js"></script>
<script>
const $=s=>document.querySelector(s), pages=['home','categories','quiz','result','statsPage','badgesPage','settings'];
const base={answers:{},wrong:[],book:[],mockHistory:[],studySeconds:0,goal:10,speechRate:1,days:{},xp:0,dark:false};
let old=localStorage.getItem('otsu4-v4')||localStorage.getItem('otsu4-v3')||localStorage.getItem('otsu4-v2')||localStorage.getItem('otsu4-final');
let st=Object.assign({},base,old?JSON.parse(old):{});
st.answers=st.answers||st.a||{};st.days=st.days||{};st.xp=st.xp||0;
let list=[],pos=0,mode='',results=[],answered=false,startAt=0,tick=null,seconds=0,examAnswers={},flags=[];
function save(){localStorage.setItem('otsu4-v4',JSON.stringify(st));localStorage.setItem('otsu4-v3',JSON.stringify(st))}
function showPage(id){pages.forEach(p=>$('#'+p).classList.toggle('hidden',p!==id));scrollTo(0,0)}
function dayKey(d=new Date()){return d.toISOString().slice(0,10)}
function touch(count=0){let k=dayKey();st.days[k]=(st.days[k]||0)+count}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function recordTime(){if(startAt){st.studySeconds+=Math.max(0,Math.floor((Date.now()-startAt)/1000));startAt=0;save()}}
function toggleDark(){st.dark=!st.dark;document.body.classList.toggle('dark',st.dark);save()}
function goHome(){clearInterval(tick);recordTime();showPage('home');updateHome()}
function calcStreak(){let n=0,d=new Date();for(;;){if(st.days[dayKey(d)]>0){n++;d.setDate(d.getDate()-1)}else break}return n}
function totals(){let r=0,t=0;Object.values(st.answers).forEach(a=>{r+=a.r||0;t+=a.t||0});return{r,t}}
function levelInfo(){let lvl=Math.floor(st.xp/100)+1,names=['見習い','基礎習得','実力養成','合格圏','乙4マスター'];return{lvl,name:names[Math.min(names.length-1,Math.floor((lvl-1)/3))],rest:st.xp%100}}
function categoryRate(cat){let r=0,t=0;QUESTIONS.filter(q=>q.category===cat).forEach(q=>{let a=st.answers[q.id];if(a){r+=a.r||0;t+=a.t||0}});return{r,t,p:t?Math.round(r/t*100):0}}
function advice(){let attempted=Object.keys(st.answers).length;if(attempted<10)return'まずは「今日の10問」で学習データを作りましょう。';let cats=['法令','物理化学','性質消火'].map(c=>({c,...categoryRate(c)})).sort((a,b)=>a.p-b.p);if(st.wrong.length)return'間違いが '+st.wrong.length+'問あります。おすすめ出題で優先復習しましょう。';if(cats[0].p<65)return'現在は「'+cats[0].c+'」が弱点です。分野別問題で重点学習しましょう。';return'合格圏に近づいています。本試験35問模試で仕上がりを確認しましょう。'}
function updateHome(){let {r,t}=totals(),lv=levelInfo(),today=st.days[dayKey()]||0;$('#summary').textContent='100問中 '+Object.keys(st.answers).length+'問に挑戦';$('#todayBadge').textContent='今日 '+today+'/'+st.goal+'問';$('#dailyBar').style.width=Math.min(100,today/st.goal*100)+'%';$('#rate').textContent=(t?Math.round(r/t*100):0)+'%';$('#streak').textContent=calcStreak()+'日';$('#minutes').textContent=Math.floor(st.studySeconds/60)+'分';$('#best').textContent=st.mockHistory.length?Math.max(...st.mockHistory.map(x=>x.score))+'%':'-';$('#level').textContent='Lv.'+lv.lvl+' '+lv.name;$('#xpText').textContent=st.xp+' XP';$('#xpBar').style.width=lv.rest+'%';$('#advice').textContent=advice();$('#wrongText').textContent=st.wrong.length+'問';$('#bookText').textContent=st.book.length+'問';document.body.classList.toggle('dark',!!st.dark)}
function priorityList(){return shuffle(QUESTIONS).sort((a,b)=>{let A=st.answers[a.id],B=st.answers[b.id];let sa=!A?100:(1-A.r/A.t)*80+(st.wrong.includes(a.id)?40:0);let sb=!B?100:(1-B.r/B.t)*80+(st.wrong.includes(b.id)?40:0);return sb-sa}).slice(0,20)}
function startMode(m){mode=m;examAnswers={};flags=[];if(m==='daily')list=shuffle(QUESTIONS).slice(0,10);if(m==='all')list=[...QUESTIONS];if(m==='priority')list=priorityList();if(m==='wrong'){list=QUESTIONS.filter(q=>st.wrong.includes(q.id));if(!list.length)return alert('間違い問題はありません')}if(m==='book'){list=QUESTIONS.filter(q=>st.book.includes(q.id));if(!list.length)return alert('お気に入りはありません')}if(m==='mock')list=[...shuffle(QUESTIONS.filter(q=>q.category==='法令')).slice(0,15),...shuffle(QUESTIONS.filter(q=>q.category==='物理化学')).slice(0,10),...shuffle(QUESTIONS.filter(q=>q.category==='性質消火')).slice(0,10)];begin()}
function startCategory(c){mode='category';list=shuffle(QUESTIONS.filter(q=>q.category===c));begin()}
function begin(){pos=0;results=[];seconds=mode==='mock'?7200:0;startAt=Date.now();showPage('quiz');startTimer();render()}
function startTimer(){clearInterval(tick);if(mode!=='mock'){$('#timer').textContent='';return}updateTimer();tick=setInterval(()=>{seconds--;updateTimer();if(seconds<=0){clearInterval(tick);submitMock(true)}},1000)}
function updateTimer(){$('#timer').textContent=Math.floor(seconds/60)+':'+String(seconds%60).padStart(2,'0')}
function render(){answered=false;let q=list[pos];$('#catBadge').textContent=q.category;$('#counter').textContent=(pos+1)+'/'+list.length;$('#quizBar').style.width=(pos/list.length*100)+'%';$('#question').textContent=q.question;$('#starBtn').textContent=st.book.includes(q.id)?'★':'☆';$('#flagBtn').classList.toggle('hidden',mode!=='mock');$('#flagBtn').textContent=flags.includes(pos)?'⚑':'⚐';$('#feedback').className='hidden';$('#nextBtn').classList.add('hidden');$('#examNav').classList.toggle('hidden',mode!=='mock');$('#choices').innerHTML='';
q.choices.forEach((x,i)=>{let b=document.createElement('button');b.className='choice';b.innerHTML='<b>'+['A','B','C','D'][i]+'</b><span>'+x+'</span>';if(mode==='mock'){if(examAnswers[pos]===i)b.style.borderColor='#1d4ed8';b.onclick=()=>{examAnswers[pos]=i;render()}}else b.onclick=()=>answer(i);$('#choices').appendChild(b)});if(mode==='mock')renderQGrid()}
function renderQGrid(){$('#qgrid').innerHTML=list.map((_,i)=>'<button class="qnum '+(examAnswers[i]!==undefined?'done ':'')+(flags.includes(i)?'flagged ':'')+(i===pos?'current':'')+'" onclick="jumpExam('+i+')">'+(i+1)+'</button>').join('')}
function answer(i){if(answered)return;answered=true;let q=list[pos],ok=i===q.answer;results.push({cat:q.category,ok,id:q.id});st.answers[q.id]??={r:0,t:0};st.answers[q.id].t++;if(ok){st.answers[q.id].r++;st.wrong=st.wrong.filter(x=>x!==q.id);st.xp+=10}else{if(!st.wrong.includes(q.id))st.wrong.push(q.id);st.xp+=3}touch(1);[...$('#choices').children].forEach((b,j)=>{b.disabled=true;if(j===q.answer)b.classList.add('correct');if(j===i&&!ok)b.classList.add('wrong')});$('#feedback').className='explain';$('#feedback').innerHTML='<b>'+(ok?'⭕ 正解':'❌ 不正解')+'</b><br>正解：'+q.choices[q.answer]+'<br><br>'+q.explanation;$('#nextBtn').textContent=pos===list.length-1?'結果を見る':'次へ';$('#nextBtn').classList.remove('hidden');save()}
function nextQuestion(){pos++;pos>=list.length?finish():render()}
function jumpExam(i){pos=i;render()}function examMove(d){pos=Math.max(0,Math.min(list.length-1,pos+d));render()}function toggleFlag(){flags.includes(pos)?flags=flags.filter(x=>x!==pos):flags.push(pos);render()}
function submitMock(force=false){if(!force){let unanswered=list.length-Object.keys(examAnswers).length;if(unanswered&&!confirm('未回答が '+unanswered+'問あります。採点しますか？'))return}results=[];list.forEach((q,i)=>{let chosen=examAnswers[i],ok=chosen===q.answer;results.push({cat:q.category,ok,id:q.id});if(chosen!==undefined){st.answers[q.id]??={r:0,t:0};st.answers[q.id].t++;if(ok){st.answers[q.id].r++;st.wrong=st.wrong.filter(x=>x!==q.id);st.xp+=10}else{if(!st.wrong.includes(q.id))st.wrong.push(q.id);st.xp+=3}touch(1)}});finish()}
function finish(){clearInterval(tick);recordTime();showPage('result');let correct=results.filter(x=>x.ok).length,rows='',pass=true,detail={};['法令','物理化学','性質消火'].forEach(c=>{let a=results.filter(x=>x.cat===c);if(a.length){let r=a.filter(x=>x.ok).length,p=Math.round(r/a.length*100);detail[c]=p;if(mode==='mock'&&p<60)pass=false;rows+='<tr><td>'+c+'</td><td>'+r+'/'+a.length+'</td><td>'+p+'%</td></tr>'}});let pct=results.length?Math.round(correct/results.length*100):0;$('#score').textContent=correct+'/'+results.length;$('#resultMsg').textContent=mode==='mock'?(pass&&results.length===35?'🎉 模試判定：合格':'模試判定：不合格'):(pct>=60?'合格圏です':'復習して再挑戦しましょう');$('#resultTable').innerHTML=rows;if(mode==='mock'){st.mockHistory.unshift({date:new Date().toLocaleString('ja-JP'),score:pct,pass:pass&&results.length===35,detail});st.mockHistory=st.mockHistory.slice(0,50)}save()}
function toggleBook(){let id=list[pos].id;st.book=st.book.includes(id)?st.book.filter(x=>x!==id):[...st.book,id];save();$('#starBtn').textContent=st.book.includes(id)?'★':'☆'}
function quitQuiz(){if(confirm('中断しますか？'))goHome()}
function speakQuestion(){let q=list[pos];if(!('speechSynthesis'in window))return alert('音声読み上げに対応していません');speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(q.question+'。選択肢。'+q.choices.map((x,i)=>['A','B','C','D'][i]+'、'+x).join('。'));u.lang='ja-JP';u.rate=st.speechRate;speechSynthesis.speak(u)}
function showStats(){showPage('statsPage');$('#categoryBars').innerHTML=['法令','物理化学','性質消火'].map(c=>{let x=categoryRate(c);return'<div class="barrow"><div class="barlabel"><b>'+c+'</b><span>'+x.r+'/'+x.t+'　'+x.p+'%</span></div><div class="mini"><div style="width:'+x.p+'%"></div></div></div>'}).join('');let arr=[];for(let i=13;i>=0;i--){let d=new Date();d.setDate(d.getDate()-i);let k=dayKey(d),n=st.days[k]||0;arr.push('<div class="day '+(n?'active':'')+'">'+(d.getMonth()+1)+'/'+d.getDate()+'<br>'+n+'問</div>')}$('#calendar').innerHTML=arr.join('');let weak=Object.entries(st.answers).filter(([id,a])=>a.t>=2&&a.r/a.t<.6).sort((a,b)=>(a[1].r/a[1].t)-(b[1].r/b[1].t)).slice(0,10);$('#weakList').innerHTML=weak.length?weak.map(([id,a])=>{let q=QUESTIONS.find(x=>x.id==id);return'第'+id+'問（'+Math.round(a.r/a.t*100)+'%） '+(q?q.question:'')}).join('<br><br>'):'まだ十分な分析データがありません。'}
function badgeDefs(){let {t}=totals();return[{name:'🌱 はじめの一歩',ok:t>=1},{name:'🔥 3日連続学習',ok:calcStreak()>=3},{name:'📚 50問挑戦',ok:t>=50},{name:'💯 100問挑戦',ok:t>=100},{name:'⭐ お気に入り10問',ok:st.book.length>=10},{name:'🧹 間違いゼロ',ok:t>=20&&st.wrong.length===0},{name:'📝 模試初挑戦',ok:st.mockHistory.length>=1},{name:'🏆 模試合格',ok:st.mockHistory.some(x=>x.pass)},{name:'👑 乙4マスター',ok:st.xp>=1000}]}
function showBadges(){showPage('badgesPage');$('#badgeList').innerHTML=badgeDefs().map(x=>'<div class="achievement '+(x.ok?'':'locked')+'">'+x.name+'<br><span class="muted">'+(x.ok?'獲得済み':'未獲得')+'</span></div>').join('')}
function saveSettings(){st.goal=Math.max(1,Number($('#goal').value)||10);st.speechRate=Number($('#speechRate').value)||1;save();alert('保存しました');goHome()}
function exportData(){let b=new Blob([JSON.stringify(st,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='乙4_MASTER_V4_成績.json';a.click()}
function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{st=Object.assign({},base,JSON.parse(r.result));save();alert('読み込みました');goHome()}catch(_){alert('読み込みに失敗しました')}};r.readAsText(f)}
function resetData(){if(confirm('学習履歴をすべて削除しますか？')){['otsu4-v4','otsu4-v3','otsu4-v2','otsu4-final'].forEach(k=>localStorage.removeItem(k));location.reload()}}
async function sw(){if(!('serviceWorker'in navigator)||location.protocol==='file:')return;try{let r=await navigator.serviceWorker.register('./sw.js?v=4',{updateViaCache:'none'});await r.update();let reloading=false;navigator.serviceWorker.addEventListener('controllerchange',()=>{if(!reloading){reloading=true;location.reload()}})}catch(e){console.log(e)}}
$('#goal').value=st.goal;$('#speechRate').value=st.speechRate;sw();updateHome();
</script>
</body></html>
