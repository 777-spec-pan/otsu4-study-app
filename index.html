<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7f1d1d">
<link rel="manifest" href="manifest.webmanifest">
<title>危険物乙4 合格トレーナー V3</title>
<style>
:root{--r:#b91c1c;--r2:#7f1d1d;--bg:#f5f4ef;--card:#fff;--txt:#1f2937;--mut:#6b7280;--line:#e5e7eb;--ok:#15803d;--ng:#c2410c;--gold:#d97706;--blue:#1d4ed8;--fs:16px}
body.dark{--bg:#0f172a;--card:#1e293b;--txt:#f8fafc;--mut:#cbd5e1;--line:#334155}
*{box-sizing:border-box}html{font-size:var(--fs)}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,var(--r2),var(--r));color:#fff;padding:12px 14px;box-shadow:0 2px 8px #0003}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px}h1{font-size:1.13rem;margin:0}.sub{font-size:.72rem;opacity:.9}.headBtns{display:flex;gap:5px}
main{max-width:780px;margin:auto;padding:14px 14px 100px}.card{background:var(--card);border-radius:17px;padding:17px;margin:12px 0;box-shadow:0 3px 16px #0002}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.metric{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}.metric b{font-size:1.15rem;display:block}.metric span{font-size:.7rem;color:var(--mut)}
button{font:inherit;border:0;border-radius:12px;padding:13px;cursor:pointer}.mode{background:var(--card);color:var(--txt);border:1px solid var(--line);text-align:left;min-height:87px}.mode b{display:block}.mode span,.muted{font-size:.78rem;color:var(--mut)}
.primary{background:var(--r);color:#fff;font-weight:800}.secondary{background:var(--line);color:var(--txt)}.blue{background:var(--blue);color:#fff;font-weight:800}.icon{background:#ffffff22;color:#fff;padding:8px}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}.badge{padding:5px 9px;border-radius:99px;background:#fee2e2;color:#991b1b;font-size:.75rem;font-weight:800}
.progress{height:10px;background:var(--line);border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--r2),var(--r))}
.question{font-size:1.22rem;line-height:1.55;font-weight:800;margin:15px 0}.choice{width:100%;margin:7px 0;text-align:left;background:var(--card);color:var(--txt);border:2px solid var(--line);display:flex;gap:10px}.choice.correct{border-color:var(--ok);background:#dcfce7;color:#14532d}.choice.wrong{border-color:var(--ng);background:#ffedd5;color:#7c2d12}
.explain{border-left:5px solid var(--r);background:#fff7ed;color:#431407;padding:13px;border-radius:8px;margin-top:14px;line-height:1.65}.hidden{display:none!important}
.score{font-size:2.8rem;font-weight:900;color:var(--r);text-align:center}.stats{width:100%;border-collapse:collapse}.stats td,.stats th{padding:9px;border-bottom:1px solid var(--line);text-align:left}.star{font-size:1.4rem;background:transparent;color:#f59e0b;padding:3px}
.notice{background:#eff6ff;color:#1e3a8a;padding:10px;border-radius:9px;font-size:.78rem;line-height:1.5}.advice{background:#fef3c7;color:#78350f;padding:12px;border-radius:12px;line-height:1.55}
.passbox{text-align:center;padding:14px;border:2px solid var(--line);border-radius:14px;margin-top:12px}.passbox b{font-size:2.2rem;color:var(--r)}
.searchbox{width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--txt);font:inherit}
.resultItem{border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0;background:var(--card)}.flash{min-height:270px;display:flex;flex-direction:column;justify-content:center;text-align:center;border:2px dashed var(--line);border-radius:16px;padding:20px}.flash .front{font-size:1.25rem;font-weight:800}.flash .back{margin-top:15px;line-height:1.65}
.goalrow{display:flex;gap:8px;align-items:center}.goalrow input{width:85px;padding:9px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--txt)}
.history{max-height:320px;overflow:auto}.smallbtn{padding:8px 10px;font-size:.8rem}.speaker{background:var(--blue);color:#fff;padding:8px 10px}.examNav{display:flex;gap:8px;margin-top:10px}.examNav button{flex:1}
@media(max-width:560px){.grid{grid-template-columns:1fr}.dash{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header><div class="top"><div><h1>危険物乙4 合格トレーナー V3</h1><div class="sub">音声・合格推定・優先出題・本番モード</div></div><div class="headBtns"><button class="icon" onclick="fontSize()">文字</button><button class="icon" onclick="dark()">◐</button></div></div></header>
<main>
<section id="home">
 <div class="card">
  <div class="row"><div><b>今日の学習</b><div id="summary" class="muted"></div></div><span id="today" class="badge"></span></div>
  <div class="progress" style="margin-top:12px"><div id="homebar" class="bar"></div></div>
  <div class="dash">
   <div class="metric"><b id="rate">0%</b><span>総合正答率</span></div>
   <div class="metric"><b id="streak">0日</b><span>連続学習</span></div>
   <div class="metric"><b id="minutes">0分</b><span>累計学習</span></div>
   <div class="metric"><b id="mockBest">-</b><span>模試最高</span></div>
  </div>
  <div class="passbox"><span class="muted">現在の合格可能性（学習履歴からの目安）</span><br><b id="passEstimate">0%</b></div>
  <div id="advice" class="advice" style="margin-top:12px"></div>
  <div class="goalrow" style="margin-top:12px"><span class="muted">1日の目標</span><input id="goalInput" type="number" min="1" max="200" value="10"><span class="muted">問</span><button class="smallbtn secondary" onclick="saveGoal()">保存</button></div>
 </div>

 <div class="grid">
  <button class="mode" onclick="start('priority')"><b>🎯 試験に出る順</b><span>重要・苦手・未学習を優先</span></button>
  <button class="mode" onclick="start('mock')"><b>📝 本番35問模試</b><span>60分・後戻り可能</span></button>
  <button class="mode" onclick="start('daily')"><b>🔥 今日の10問</b><span>ランダム出題</span></button>
  <button class="mode" onclick="showCat()"><b>📚 分野別問題</b><span>3分野から選択</span></button>
  <button class="mode" onclick="start('wrong')"><b>🔁 間違い復習</b><span id="wrongCount"></span></button>
  <button class="mode" onclick="start('book')"><b>★ お気に入り</b><span id="bookCount"></span></button>
  <button class="mode" onclick="flashStart()"><b>🎴 暗記カード</b><span>問題と答えを確認</span></button>
  <button class="mode" onclick="searchPage()"><b>🔎 問題検索</b><span>言葉から検索</span></button>
  <button class="mode" onclick="stats()"><b>📊 成績・苦手分析</b><span>分野別正答率</span></button>
  <button class="mode" onclick="mockHistory()"><b>🏆 模試履歴</b><span>過去の判定を確認</span></button>
  <button class="mode" onclick="settings()"><b>⚙ 設定・バックアップ</b><span>音声・履歴保存</span></button>
  <button class="mode" onclick="start('all')"><b>💯 全100問</b><span>すべて学習</span></button>
 </div>
 <div class="notice" style="margin-top:14px">合格可能性は学習履歴から算出する目安で、実際の合格を保証するものではありません。</div>
</section>

<section id="cat" class="hidden"><div class="card"><h2>分野を選択</h2>
 <button class="choice" onclick="startCat('法令')">法令（35問）</button><button class="choice" onclick="startCat('物理化学')">物理・化学（25問）</button><button class="choice" onclick="startCat('性質消火')">性質・火災予防・消火（40問）</button>
 <button class="secondary" onclick="home()">戻る</button></div></section>

<section id="quiz" class="hidden"><div class="card">
 <div class="row"><span id="badge" class="badge"></span><div><b id="timer"></b> <span id="count" class="muted"></span></div></div>
 <div class="progress" style="margin-top:10px"><div id="qbar" class="bar"></div></div>
 <div class="row"><button class="speaker" onclick="speakCurrent()">🔊 読み上げ</button><button id="star" class="star" onclick="bookmark()">☆</button></div>
 <div id="q" class="question"></div><div id="choices"></div><div id="feed" class="hidden"></div>
 <div id="examNav" class="examNav hidden"><button class="secondary" onclick="prevExam()">前の問題</button><button class="secondary" onclick="nextExam()">次の問題</button></div>
 <button id="next" class="primary hidden" style="width:100%;margin-top:14px" onclick="next()">次へ</button>
 <button class="secondary" style="width:100%;margin-top:8px" onclick="quit()">中断</button>
</div></section>

<section id="result" class="hidden"><div class="card"><h2 style="text-align:center">結果</h2><div id="score" class="score"></div><div id="msg" style="text-align:center;font-weight:800;margin-bottom:12px"></div><table id="resultTable" class="stats"></table><button class="primary" style="width:100%;margin-top:14px" onclick="home()">ホームへ</button></div></section>

<section id="stats" class="hidden"><div class="card"><h2>成績・苦手分析</h2><table id="statsTable" class="stats"></table><h3>苦手問題 TOP10</h3><div id="weak" class="muted"></div><button class="primary" style="width:100%;margin-top:14px" onclick="start('priority')">優先出題を始める</button><button class="secondary" style="width:100%;margin-top:8px" onclick="home()">戻る</button></div></section>

<section id="flash" class="hidden"><div class="card"><div class="row"><span class="badge">暗記カード</span><span id="flashCount" class="muted"></span></div><div id="flashCard" class="flash" onclick="flipFlash()"><div id="flashFront" class="front"></div><div id="flashBack" class="back hidden"></div></div><div class="row" style="margin-top:12px"><button class="secondary" onclick="flashPrev()">前へ</button><button class="blue" onclick="speakFlash()">🔊</button><button class="primary" onclick="flipFlash()">答え</button><button class="secondary" onclick="flashNext()">次へ</button></div><button class="secondary" style="width:100%;margin-top:8px" onclick="home()">終了</button></div></section>

<section id="search" class="hidden"><div class="card"><h2>問題検索</h2><input id="searchInput" class="searchbox" placeholder="例：ガソリン、指定数量、消火" oninput="doSearch()"><div id="searchResults"></div><button class="secondary" style="width:100%;margin-top:12px" onclick="home()">戻る</button></div></section>

<section id="history" class="hidden"><div class="card"><h2>模試履歴</h2><div id="historyList" class="history"></div><button class="secondary" style="width:100%;margin-top:12px" onclick="home()">戻る</button></div></section>

<section id="settings" class="hidden"><div class="card"><h2>設定・バックアップ</h2>
 <button class="secondary" onclick="dark()">ダークモード</button><button class="secondary" onclick="fontSize()">文字サイズ</button>
 <div class="resultItem"><b>音声読み上げ</b><div class="row" style="margin-top:8px"><span class="muted">速度</span><input id="speechRate" type="range" min="0.6" max="1.4" step="0.1" onchange="saveSpeech()"><span id="speechRateLabel"></span></div></div>
 <button class="secondary" style="width:100%;margin-top:10px" onclick="exportData()">成績を書き出す</button>
 <label class="secondary" style="display:block;text-align:center;width:100%;margin-top:8px;padding:13px;border-radius:12px;cursor:pointer">成績を読み込む<input id="importFile" type="file" accept="application/json" class="hidden" onchange="importData(event)"></label>
 <button class="secondary" style="width:100%;margin-top:8px" onclick="resetData()">成績をリセット</button><button class="primary" style="width:100%;margin-top:14px" onclick="home()">戻る</button>
</div></section>
</main>

<script src="questions.js"></script>
<script>
const $=s=>document.querySelector(s), ids=['home','cat','quiz','result','stats','flash','search','history','settings'];
let list=[],pos=0,answered=false,res=[],mode='',sec=0,tick=null,startAt=0,flashList=[],flashPos=0,flashFlipped=false,examAnswers={};
const base={a:{},wrong:[],book:[],day:'',today:0,dark:false,font:0,goal:10,studySeconds:0,studyDays:[],mockHistory:[],speechRate:1};
let old=JSON.parse(localStorage.getItem('otsu4-v2')||localStorage.getItem('otsu4-final')||'{}');
let st=Object.assign({},base,old);
function save(){localStorage.setItem('otsu4-v3',JSON.stringify(st));localStorage.setItem('otsu4-v2',JSON.stringify(st))}
function show(x){ids.forEach(i=>$('#'+i).classList.toggle('hidden',i!==x));scrollTo(0,0)}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)} function dateKey(){return new Date().toISOString().slice(0,10)}
function touch(){let now=dateKey();if(st.day!==now){st.day=now;st.today=0}if(!st.studyDays.includes(now))st.studyDays.push(now)}
function calcStreak(){let set=new Set(st.studyDays),d=new Date(),n=0;for(;;){let k=d.toISOString().slice(0,10);if(set.has(k)){n++;d.setDate(d.getDate()-1)}else break}return n}
function prefs(){document.body.classList.toggle('dark',st.dark);document.documentElement.style.setProperty('--fs',st.font==1?'18px':st.font==2?'20px':'16px')}
function dark(){st.dark=!st.dark;save();prefs()} function fontSize(){st.font=(st.font+1)%3;save();prefs()}
function saveGoal(){st.goal=Math.max(1,Math.min(200,Number($('#goalInput').value)||10));save();update()}
function importance(q){let bonus=0;if(q.category==='法令')bonus=.12;if(/指定数量|ガソリン|引火点|消火|静電気|蒸気/.test(q.question))bonus+=.18;return bonus}
function priorityList(){return QUESTIONS.map(q=>{let a=st.a[q.id]||{r:0,t:0};let p=a.t?a.r/a.t:.45;return{q,s:(1-p)+importance(q)+(a.t===0?.25:0)+(st.wrong.includes(q.id)?.3:0)}}).sort((a,b)=>b.s-a.s).slice(0,25).map(x=>x.q)}
function passEstimate(){let cats=['法令','物理化学','性質消火'], vals=cats.map(c=>{let r=0,t=0;QUESTIONS.filter(q=>q.category===c).forEach(q=>{let a=st.a[q.id];if(a){r+=a.r;t+=a.t}});return t?r/t:0});let coverage=Object.keys(st.a).length/100;let mock=(st.mockHistory||[]).slice(0,3);let mockAvg=mock.length?mock.reduce((s,x)=>s+x.score,0)/mock.length/100:0;let baseScore=(vals.reduce((a,b)=>a+b,0)/3)*.55+coverage*.2+mockAvg*.25;return Math.max(0,Math.min(99,Math.round(baseScore*100)))}
function adviceText(){let stats=['法令','物理化学','性質消火'].map(c=>{let r=0,t=0;QUESTIONS.filter(q=>q.category===c).forEach(q=>{let a=st.a[q.id];if(a){r+=a.r;t+=a.t}});return{c,p:t?r/t:0,t}}).sort((a,b)=>a.p-b.p);if(Object.keys(st.a).length<10)return'まずは「今日の10問」で学習履歴を作りましょう。';let w=stats[0];if(w.p<.6)return'今日は「'+w.c+'」を重点的に復習するのがおすすめです。';if(st.wrong.length>0)return'間違い問題が'+st.wrong.length+'問あります。優先出題または間違い復習を進めましょう。';return'全体的に良好です。本番35問模試で仕上がりを確認しましょう。'}
function start(m){touch();mode=m;examAnswers={};if(m==='daily')list=shuffle(QUESTIONS).slice(0,10);if(m==='all')list=[...QUESTIONS];if(m==='wrong'){list=QUESTIONS.filter(q=>st.wrong.includes(q.id));if(!list.length)return alert('間違い問題はありません')}if(m==='book'){list=QUESTIONS.filter(q=>st.book.includes(q.id));if(!list.length)return alert('お気に入りはありません')}if(m==='priority')list=priorityList();if(m==='mock')list=shuffle([...shuffle(QUESTIONS.filter(q=>q.category==='法令')).slice(0,15),...shuffle(QUESTIONS.filter(q=>q.category==='物理化学')).slice(0,10),...shuffle(QUESTIONS.filter(q=>q.category==='性質消火')).slice(0,10)]);begin()}
function startCat(c){mode='cat';list=shuffle(QUESTIONS.filter(q=>q.category===c));begin()}
function begin(){pos=0;res=[];sec=mode==='mock'?3600:0;startAt=Date.now();show('quiz');timer();render()}
function timer(){clearInterval(tick);if(mode!=='mock'){$('#timer').textContent='';return}upTimer();tick=setInterval(()=>{sec--;upTimer();if(sec<=0){clearInterval(tick);finishMock()}},1000)}
function upTimer(){$('#timer').textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0')}
function render(){answered=false;let q=list[pos];$('#badge').textContent=q.category;$('#count').textContent=(pos+1)+'/'+list.length;$('#qbar').style.width=(pos/list.length*100)+'%';$('#star').textContent=st.book.includes(q.id)?'★':'☆';$('#q').textContent=q.question;$('#feed').className='hidden';$('#next').classList.add('hidden');$('#choices').innerHTML='';$('#examNav').classList.toggle('hidden',mode!=='mock');
 ['A','B','C','D'].forEach((x,i)=>{let b=document.createElement('button');b.className='choice';b.innerHTML='<b>'+x+'</b><span>'+q.choices[i]+'</span>';if(mode==='mock'){if(examAnswers[pos]===i)b.style.borderColor='#1d4ed8';b.onclick=()=>{examAnswers[pos]=i;render()}}else b.onclick=()=>answer(i);$('#choices').appendChild(b)})}
function answer(i){if(answered)return;answered=true;touch();st.today++;let q=list[pos],ok=i===q.answer;res.push({cat:q.category,ok,id:q.id});st.a[q.id]??={r:0,t:0};st.a[q.id].t++;if(ok)st.a[q.id].r++;if(ok)st.wrong=st.wrong.filter(x=>x!==q.id);else if(!st.wrong.includes(q.id))st.wrong.push(q.id);[...$('#choices').children].forEach((b,j)=>{b.disabled=true;if(j===q.answer)b.classList.add('correct');if(j===i&&!ok)b.classList.add('wrong')});$('#feed').className='explain';$('#feed').innerHTML='<b>'+(ok?'⭕ 正解':'❌ 不正解')+'</b><br>正解：'+q.choices[q.answer]+'<br>'+q.explanation;$('#next').textContent=pos===list.length-1?'結果を見る':'次へ';$('#next').classList.remove('hidden');save()}
function next(){pos++;pos>=list.length?finish():render()} function prevExam(){if(pos>0){pos--;render()}} function nextExam(){if(pos<list.length-1){pos++;render()}else finishMock()}
function finishMock(){res=[];touch();list.forEach((q,i)=>{let ok=examAnswers[i]===q.answer;res.push({cat:q.category,ok,id:q.id});if(examAnswers[i]!==undefined){st.today++;st.a[q.id]??={r:0,t:0};st.a[q.id].t++;if(ok)st.a[q.id].r++;if(ok)st.wrong=st.wrong.filter(x=>x!==q.id);else if(!st.wrong.includes(q.id))st.wrong.push(q.id)}});finish()}
function bookmark(){let id=list[pos].id;st.book=st.book.includes(id)?st.book.filter(x=>x!==id):[...st.book,id];save();$('#star').textContent=st.book.includes(id)?'★':'☆'}
function quit(){if(confirm('中断しますか？')){recordTime();home()}} function recordTime(){if(startAt){st.studySeconds+=Math.max(0,Math.floor((Date.now()-startAt)/1000));startAt=0;save()}}
function finish(){clearInterval(tick);recordTime();show('result');let c=res.filter(x=>x.ok).length,p=res.length?Math.round(c/res.length*100):0,pass=true,rows='',detail={};['法令','物理化学','性質消火'].forEach(cat=>{let a=res.filter(x=>x.cat===cat);if(a.length){let r=a.filter(x=>x.ok).length,z=Math.round(r/a.length*100);detail[cat]=z;if(mode==='mock'&&z<60)pass=false;rows+='<tr><td>'+cat+'</td><td>'+r+'/'+a.length+'</td><td>'+z+'%</td></tr>'}});$('#score').textContent=c+'/'+res.length;$('#msg').textContent=mode==='mock'?(pass&&res.length===35?'🎉 模試判定：合格':'模試判定：不合格'):p>=60?'合格圏です':'復習して再挑戦しましょう';$('#resultTable').innerHTML=rows;if(mode==='mock'&&res.length){st.mockHistory.unshift({date:new Date().toLocaleString('ja-JP'),score:p,pass:pass&&res.length===35,detail});st.mockHistory=st.mockHistory.slice(0,50)}save()}
function speak(text){if(!('speechSynthesis'in window))return alert('この端末では音声読み上げに対応していません');speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(text);u.lang='ja-JP';u.rate=st.speechRate||1;speechSynthesis.speak(u)}
function speakCurrent(){let q=list[pos];speak(q.question+'。選択肢。'+q.choices.map((x,i)=>['A','B','C','D'][i]+'、'+x).join('。'))}
function saveSpeech(){st.speechRate=Number($('#speechRate').value);$('#speechRateLabel').textContent=st.speechRate+'倍';save()}
function showCat(){show('cat')} function settings(){show('settings');$('#speechRate').value=st.speechRate;$('#speechRateLabel').textContent=st.speechRate+'倍'} function home(){clearInterval(tick);recordTime();show('home');update()}
function stats(){show('stats');let R=0,T=0,rows='';['法令','物理化学','性質消火'].forEach(c=>{let r=0,t=0;QUESTIONS.filter(q=>q.category===c).forEach(q=>{let a=st.a[q.id];if(a){r+=a.r;t+=a.t}});R+=r;T+=t;rows+='<tr><td>'+c+'</td><td>'+r+'/'+t+'</td><td>'+(t?Math.round(r/t*100):0)+'%</td></tr>'});rows+='<tr><td><b>総合</b></td><td><b>'+R+'/'+T+'</b></td><td><b>'+(T?Math.round(R/T*100):0)+'%</b></td></tr>';$('#statsTable').innerHTML=rows;let w=Object.entries(st.a).filter(([id,a])=>a.t>=2&&a.r/a.t<.6).sort((a,b)=>(a[1].r/a[1].t)-(b[1].r/b[1].t)).slice(0,10);$('#weak').innerHTML=w.length?w.map(([id,a])=>{let q=QUESTIONS.find(x=>x.id==id);return'第'+id+'問　'+Math.round(a.r/a.t*100)+'%　'+(q?q.question:'')}).join('<br><br>'):'まだ分析データがありません'}
function flashStart(){flashList=st.book.length?QUESTIONS.filter(q=>st.book.includes(q.id)):shuffle(QUESTIONS);flashPos=0;flashFlipped=false;show('flash');renderFlash()} function renderFlash(){let q=flashList[flashPos];$('#flashCount').textContent=(flashPos+1)+'/'+flashList.length;$('#flashFront').textContent=q.question;$('#flashBack').innerHTML='<b>正解：'+q.choices[q.answer]+'</b><br><br>'+q.explanation;$('#flashBack').classList.toggle('hidden',!flashFlipped)} function flipFlash(){flashFlipped=!flashFlipped;renderFlash()} function flashNext(){flashPos=(flashPos+1)%flashList.length;flashFlipped=false;renderFlash()} function flashPrev(){flashPos=(flashPos-1+flashList.length)%flashList.length;flashFlipped=false;renderFlash()} function speakFlash(){let q=flashList[flashPos];speak(q.question+(flashFlipped?'。正解は、'+q.choices[q.answer]+'。'+q.explanation:''))}
function searchPage(){show('search');$('#searchInput').value='';$('#searchResults').innerHTML='<div class="muted" style="margin-top:12px">検索語を入力してください。</div>'} function doSearch(){let k=$('#searchInput').value.trim().toLowerCase();if(!k){$('#searchResults').innerHTML='';return}let hit=QUESTIONS.filter(q=>(q.question+' '+q.choices.join(' ')+' '+q.explanation).toLowerCase().includes(k)).slice(0,30);$('#searchResults').innerHTML=hit.length?hit.map(q=>'<div class="resultItem"><b>第'+q.id+'問［'+q.category+'］</b><br>'+q.question+'<div class="muted" style="margin-top:6px">正解：'+q.choices[q.answer]+'</div></div>').join(''):'<div class="muted" style="margin-top:12px">該当なし</div>'}
function mockHistory(){show('history');let h=st.mockHistory||[];$('#historyList').innerHTML=h.length?h.map(x=>'<div class="resultItem"><div class="row"><b>'+(x.pass?'合格':'不合格')+'</b><span class="badge">'+x.score+'%</span></div><div class="muted">'+x.date+'</div><div class="muted" style="margin-top:5px">'+Object.entries(x.detail||{}).map(([k,v])=>k+' '+v+'%').join('／')+'</div></div>').join(''):'<div class="muted">まだ模試履歴はありません。</div>'}
function update(){touch();let n=Object.keys(st.a).length,R=0,T=0;Object.values(st.a).forEach(a=>{R+=a.r;T+=a.t});$('#summary').textContent='100問中 '+n+'問に挑戦';$('#homebar').style.width=Math.min(100,(st.today/st.goal*100))+'%';$('#today').textContent='今日 '+st.today+'/'+st.goal+'問';$('#rate').textContent=(T?Math.round(R/T*100):0)+'%';$('#streak').textContent=calcStreak()+'日';$('#minutes').textContent=Math.floor(st.studySeconds/60)+'分';$('#mockBest').textContent=(st.mockHistory||[]).length?Math.max(...st.mockHistory.map(x=>x.score))+'%':'-';$('#wrongCount').textContent=st.wrong.length+'問を復習';$('#bookCount').textContent=st.book.length+'問を保存';$('#goalInput').value=st.goal;$('#passEstimate').textContent=passEstimate()+'%';$('#advice').textContent=adviceText();save()}
function resetData(){if(confirm('履歴をすべて削除しますか？')){['otsu4-v3','otsu4-v2','otsu4-final'].forEach(x=>localStorage.removeItem(x));location.reload()}} function exportData(){let b=new Blob([JSON.stringify(st,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='乙4_V3_成績バックアップ.json';a.click()} function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{st=Object.assign({},base,JSON.parse(r.result));save();prefs();update();alert('成績を読み込みました')}catch(err){alert('読み込み失敗')}};r.readAsText(f)}
if('serviceWorker'in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('sw.js');prefs();update();
</script></body></html>
