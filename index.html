 $('#qtitle').textContent=label+'－問'+(index+1);
 $('#question').textContent=q.question;
 $('#choices').innerHTML=q.choices.map((x,i)=>`<button class="choice ${selected[index]===i?'selected':''} ${revealed[index]?(i===q.answer?'correct':selected[index]===i?'wrong':''):''}" onclick="choose(${i})">${i+1}：${x}</button>`).join('');
 $('#data').classList.toggle('hidden',!revealed[index]);
 if(revealed[index]){
   $('#answer').textContent='答：'+(q.answer+1);
   let a=localStorage.getItem('v51-'+q.id),rate=a?JSON.parse(a):{r:0,t:0};
   $('#rate').textContent='★あなたの正解率 '+(rate.t?Math.round(rate.r/rate.t*100):0)+'%（'+rate.r+'/'+rate.t+'）';
   $('#memory').innerHTML='<b>覚えよう！</b><br>'+q.explanation+'<br><br>'+q.memory;
   $('#meta').textContent='カテゴリ：'+q.category+'　出題分野：'+q.topic;
 }
 $('#numbers').innerHTML=list.map((x,i)=>`<button class="num ${i===index?'now':''} ${revealed[i]?'done':''}" onclick="jump(${i})">${i+1}</button>`).join('');
}
function choose(i){if(revealed[index])return;selected[index]=i;render()}
function reveal(){
 if(selected[index]===undefined)return alert('選択肢を選んでください。');
 if(revealed[index])return;
 let q=currentList()[index],key='v51-'+q.id,a=JSON.parse(localStorage.getItem(key)||'{"r":0,"t":0}');
 a.t++;if(selected[index]===q.answer)a.r++;localStorage.setItem(key,JSON.stringify(a));revealed[index]=true;render()
}
function next(){let list=currentList();if(index<list.length-1){index++;render()}else finish()}
function prev(){if(index>0){index--;render()}}
function jump(i){index=i;render()}
function finish(){
 let list=currentList(),done=list.filter((q,i)=>revealed[i]);
 if(done.length<list.length&&!confirm('未回答があります。採点結果へ進みますか？'))return;
 show('result');let rows='',total=0,correct=0;
 cats.forEach(c=>{let qs=list.map((q,i)=>({q,i})).filter(x=>x.q.category===c);if(!qs.length)return;let r=qs.filter(x=>selected[x.i]===x.q.answer).length;total+=qs.length;correct+=r;let p=Math.round(r/qs.length*100);rows+=`<tr><td>${c}</td><td>${r}/${qs.length}</td><td class="${p>=60?'pass':'fail'}">${p}%</td></tr>`});
 $('#resultTitle').textContent='予想問題第'+(10-round)+'回 採点結果';$('#score').textContent=correct+' / '+total;
 $('#resultTable').innerHTML='<tr><th>科目</th><th>正解</th><th>正答率</th></tr>'+rows;
}
function retryWrong(){
 let list=currentList(),wrong=list.filter((q,i)=>selected[i]!==q.answer);if(!wrong.length)return alert('間違いはありません。');
 ROUNDS.push(wrong);round=ROUNDS.length-1;section=null;index=0;selected={};revealed={};show('quiz');render()
}
function goTop(){show('top')}
buildTop();
</script>
